name: multi_agent_sys
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - pip:
      # ── LangChain / LangGraph core ──────────────────────────────────────────
      - langchain==0.3.25
      - langchain-core==0.3.60
      - langchain-community==0.3.24
      - langchain-ollama==0.3.3
      - langgraph==0.2.73           # last version compatible with langchain-core 0.3.x

      # ── MCP (official Python SDK) ────────────────────────────────────────────
      - mcp==1.9.2

      # ── LLM / Embeddings ────────────────────────────────────────────────────
      - ollama==0.4.8                   # Python client for local Ollama server

      # ── Agent Tools ─────────────────────────────────────────────────────────
      - duckduckgo-search==8.0.1
      - wikipedia==1.4.0

      # ── Vector Memory ───────────────────────────────────────────────────────
      - chromadb==0.6.3

      # ── Database / Logging ──────────────────────────────────────────────────
      - sqlalchemy==2.0.41
      - aiosqlite==0.21.0               # async SQLite driver

      # ── API Layer ───────────────────────────────────────────────────────────
      - fastapi==0.115.12
      - uvicorn[standard]==0.34.2
      - httpx==0.28.1                   # async HTTP client (MCP client calls)

      # ── Data Validation ─────────────────────────────────────────────────────
      - pydantic==2.11.5
      - pydantic-settings==2.9.1

      # ── Config ──────────────────────────────────────────────────────────────
      - pyyaml==6.0.2
      - python-dotenv==1.1.0

      # ── Testing ─────────────────────────────────────────────────────────────
      - pytest==8.4.0
      - pytest-asyncio==0.26.0
      - httpx==0.28.1                   # also used for FastAPI TestClient

      # ── Dev / Utilities ─────────────────────────────────────────────────────
      - rich==14.0.0                    # pretty terminal output / tracing
      - tenacity==9.1.2                 # retry logic for failure isolation
      - uuid==1.30